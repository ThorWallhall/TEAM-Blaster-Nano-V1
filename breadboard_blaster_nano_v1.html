<!DOCTYPE html>
<html lang="de">
<head>

<title>T.E.A.M. Blaster Nano V1 – Breadboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

    background: #f5f2e8;

</style>
</head>
<body>
<div class="wrap">
<h2>T.E.A.M. – Blaster Nano V1 &nbsp;|&nbsp; Phase 1 — <span>Breadboard-Aufbau</span></h2>
<svg width="700" height="510" viewBox="0 0 700 510" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Breadboard hole patterns -->
  <!-- Left side: cols a-e, origin at col_a(88) row_1(56) -->
  <pattern id="ph-l" x="88" y="56" width="16" height="16" patternUnits="userSpaceOnUse">
    <circle cx="0" cy="0" r="2.7" fill="#7B5B28" stroke="#5A3A08" stroke-width=".5"/>
  </pattern>
  <!-- Right side: cols f-j, origin at col_f(178) row_1(56) -->
  <pattern id="ph-r" x="178" y="56" width="16" height="16" patternUnits="userSpaceOnUse">
    <circle cx="0" cy="0" r="2.7" fill="#7B5B28" stroke="#5A3A08" stroke-width=".5"/>
  </pattern>
  <!-- Rail holes -->
  <pattern id="ph-vl" x="41" y="56" width="16" height="16" patternUnits="userSpaceOnUse">
    <circle cx="0" cy="0" r="2.4" fill="#BB6060" stroke="#993030" stroke-width=".5"/>
  </pattern>
  <pattern id="ph-nl" x="57" y="56" width="16" height="16" patternUnits="userSpaceOnUse">
    <circle cx="0" cy="0" r="2.4" fill="#6060BB" stroke="#303099" stroke-width=".5"/>
  </pattern>
  <pattern id="ph-vr" x="264" y="56" width="16" height="16" patternUnits="userSpaceOnUse">
    <circle cx="0" cy="0" r="2.4" fill="#BB6060" stroke="#993030" stroke-width=".5"/>
  </pattern>
  <pattern id="ph-nr" x="281" y="56" width="16" height="16" patternUnits="userSpaceOnUse">
    <circle cx="0" cy="0" r="2.4" fill="#6060BB" stroke="#303099" stroke-width=".5"/>
  </pattern>
  <!-- Resistor body gradient -->
  <linearGradient id="rg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ECC870"/>
    <stop offset="100%" stop-color="#D2A840"/>
  </linearGradient>
</defs>

<!--
  GRID REFERENCE:
  Row y = 56 + (row-1)*16  |  r3=88  r6=136  r7=152  r8=168  r10=200
  r12=232  r13=248  r14=264  r15=280  r16=296  r18=328  r20=360
  Cols: a=88 b=104 c=120 d=136 e=152 | gap | f=178 g=194 h=210 i=226 j=242
  Rails: lv=41 lg=57 rv=264 rg=281
-->

<!-- ============================== BREADBOARD BODY ============================== -->
<rect x="30" y="36" width="274" height="448" rx="7" fill="#CBC691" stroke="#A8A050" stroke-width="1.5"/>
<!-- Left VCC rail -->
<rect x="34" y="42" width="14" height="436" rx="2" fill="#FFE6E6" stroke="#DDA0A0" stroke-width=".5"/>
<!-- Left GND rail -->
<rect x="50" y="42" width="14" height="436" rx="2" fill="#E6E6FF" stroke="#A0A0DD" stroke-width=".5"/>
<!-- Center notch / gap -->
<rect x="156" y="42" width="20" height="436" fill="#B8B484"/>
<!-- Right VCC rail -->
<rect x="256" y="42" width="14" height="436" rx="2" fill="#FFE6E6" stroke="#DDA0A0" stroke-width=".5"/>
<!-- Right GND rail -->
<rect x="272" y="42" width="14" height="436" rx="2" fill="#E6E6FF" stroke="#A0A0DD" stroke-width=".5"/>

<!-- Hole grid patterns -->
<rect x="88" y="56" width="72" height="400" fill="url(#ph-l)"/>
<rect x="178" y="56" width="72" height="400" fill="url(#ph-r)"/>

<rect x="53" y="56" width="8" height="400" fill="url(#ph-nl)"/>
<rect x="260" y="56" width="8" height="400" fill="url(#ph-vr)"/>
<rect x="277" y="56" width="8" height="400" fill="url(#ph-nr)"/>

<text x="57" y="49" text-anchor="middle" style="font:bold 9px sans-serif;fill:#2222CC">−</text>
<text x="263" y="49" text-anchor="middle" style="font:bold 9px sans-serif;fill:#CC2222">+</text>
<text x="281" y="49" text-anchor="middle" style="font:bold 9px sans-serif;fill:#2222CC">−</text>

<text x="104" y="51" text-anchor="middle" style="font:bold 8px monospace;fill:#6A4A20">b</text>
<text x="120" y="51" text-anchor="middle" style="font:bold 8px monospace;fill:#6A4A20">c</text>
<text x="136" y="51" text-anchor="middle" style="font:bold 8px monospace;fill:#6A4A20">d</text>
<text x="152" y="51" text-anchor="middle" style="font:bold 8px monospace;fill:#6A4A20">e</text>
<text x="178" y="51" text-anchor="middle" style="font:bold 8px monospace;fill:#6A4A20">f</text>
<text x="194" y="51" text-anchor="middle" style="font:bold 8px monospace;fill:#6A4A20">g</text>
<text x="210" y="51" text-anchor="middle" style="font:bold 8px monospace;fill:#6A4A20">h</text>
<text x="226" y="51" text-anchor="middle" style="font:bold 8px monospace;fill:#6A4A20">i</text>
<text x="242" y="51" text-anchor="middle" style="font:bold 8px monospace;fill:#6A4A20">j</text>

<!-- Row numbers (y_text = 56+(r-1)*16+3) -->
<text x="83" y="59"  text-anchor="end" style="font:7px monospace;fill:#7A5A2A"> 1</text>
<text x="83" y="75"  text-anchor="end" style="font:7px monospace;fill:#7A5A2A"> 2</text>
<text x="83" y="91"  text-anchor="end" style="font:bold 7px monospace;fill:#7A5A2A"> 3</text>
<text x="83" y="107" text-anchor="end" style="font:7px monospace;fill:#7A5A2A"> 4</text>

<text x="83" y="331" text-anchor="end" style="font:bold 7px monospace;fill:#7A5A2A">18</text>

<text x="83" y="411" text-anchor="end" style="font:7px monospace;fill:#7A5A2A">23</text>

<!-- Power supply label -->
<text x="40" y="33" text-anchor="middle" style="font:bold 7px sans-serif;fill:#CC2222">⚡5V</text>

<!-- ============================== WIRES (drawn before components) ============================== -->

<!-- === VCC wires (red) === -->

<line x1="41" y1="88" x2="104" y2="88" stroke="#CC3333" stroke-width="2.5" stroke-linecap="round"/>

<line x1="41" y1="296" x2="152" y2="296" stroke="#CC3333" stroke-width="2.5" stroke-linecap="round"/>
<!-- Right rail r13 → NE555 Pin8/VCC (col_f r13) -->
<line x1="264" y1="248" x2="178" y2="248" stroke="#CC3333" stroke-width="2.5" stroke-linecap="round"/>
<!-- DFPlayer VCC → right VCC rail r3 -->
<line x1="374" y1="88" x2="264" y2="88" stroke="#CC3333" stroke-width="2" stroke-linecap="round"/>

<!-- === GND wires (dark blue) === -->
<!-- Left GND r8 → 100nF Minus-Seite (col_a r8) -->
<line x1="57" y1="168" x2="88" y2="168" stroke="#1A2E8A" stroke-width="2.5" stroke-linecap="round"/>
<!-- Left GND r7 → Taster GND-Seite (col_c r7) -->
<line x1="57" y1="152" x2="120" y2="152" stroke="#1A2E8A" stroke-width="2.5" stroke-linecap="round"/>

<line x1="57" y1="248" x2="152" y2="248" stroke="#1A2E8A" stroke-width="2.5" stroke-linecap="round"/>

<line x1="281" y1="328" x2="226" y2="328" stroke="#1A2E8A" stroke-width="2.5" stroke-linecap="round"/>
<!-- Left GND r20 → LED Kathode (col_a r20) -->
<line x1="57" y1="360" x2="88" y2="360" stroke="#1A2E8A" stroke-width="2.5" stroke-linecap="round"/>
<!-- DFPlayer GND → right GND rail r4 -->
<line x1="374" y1="104" x2="281" y2="104" stroke="#1A2E8A" stroke-width="2" stroke-linecap="round"/>

<!-- === ORANGE SIGNAL (Taster-Signal → 555 TRIG + DFPlayer IO1) === -->

<!-- Flying wire: DFPlayer IO1 → Taster-Signal row6 col_a
     Bezier curve to avoid crossing right VCC strip hole at row6 -->
<path d="M374,136 C330,114 140,114 88,136"
      stroke="#E8981D" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<!-- Bridge: left bus col_e → right bus col_f at row6 (center gap crossing) -->
<line x1="152" y1="136" x2="178" y2="136" stroke="#E8981D" stroke-width="2.5" stroke-linecap="round"/>
<!-- Down col_f right side: r6 → r12 (routing to avoid taster-GND at r7) -->
<line x1="178" y1="136" x2="178" y2="232" stroke="#E8981D" stroke-width="2.5" stroke-linecap="round"/>
<!-- Cross center gap at r12: col_f right → col_d left -->
<line x1="178" y1="232" x2="136" y2="232" stroke="#E8981D" stroke-width="2.5" stroke-linecap="round"/>
<!-- Down col_d: r12 → r14 (connects to NE555 Pin2 bus = row14 left) -->
<line x1="136" y1="232" x2="136" y2="264" stroke="#E8981D" stroke-width="2.5" stroke-linecap="round"/>

<!-- Orange junction dots -->
<circle cx="88"  cy="136" r="4" fill="#E8981D" stroke="#B86800" stroke-width=".5"/>
<circle cx="152" cy="136" r="4" fill="#E8981D" stroke="#B86800" stroke-width=".5"/>
<circle cx="178" cy="136" r="4" fill="#E8981D" stroke="#B86800" stroke-width=".5"/>
<circle cx="178" cy="232" r="4" fill="#E8981D" stroke="#B86800" stroke-width=".5"/>
<circle cx="136" cy="232" r="4" fill="#E8981D" stroke="#B86800" stroke-width=".5"/>
<circle cx="136" cy="264" r="4" fill="#E8981D" stroke="#B86800" stroke-width=".5"/>

<!-- === PURPLE TIMING (Pin6 ↔ Pin7 node via col_h) === -->
<!-- Short vertical wire connects row14-right-bus to row15-right-bus via col_h -->
<line x1="210" y1="264" x2="210" y2="280" stroke="#8866CC" stroke-width="2" stroke-linecap="round"/>
<circle cx="210" cy="264" r="3.5" fill="#8866CC"/>
<circle cx="210" cy="280" r="3.5" fill="#8866CC"/>

<!-- === BLUE DASHED (row 15 bus: NE555 Pin3 → 100Ω, same bus, no wire needed) === -->
<line x1="152" y1="280" x2="104" y2="280" stroke="#4488CC" stroke-width="1.5"
      stroke-dasharray="4,3" stroke-linecap="round" opacity=".7"/>

<polyline points="374,184 342,184 342,270 374,270"
          stroke="#229933" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

<text x="152" y="131" text-anchor="middle" style="font:5px sans-serif;fill:#1A2E8A">G</text>
