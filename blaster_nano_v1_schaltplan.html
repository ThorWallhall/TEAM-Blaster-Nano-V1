<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T.E.A.M. - Blaster Nano V1 Schaltplan</title>
<style>
  body {
    margin: 0;
    padding: 24px;
    font-family: sans-serif;
    background: #ffffff;
    color: #1a1a1a;
  }

  /* Color ramps */
  .c-blue  rect, .c-blue  circle { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue  text.th { fill: #0C447C; }
  .c-blue  text.ts { fill: #185FA5; }

  .c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text.th { fill: #3C3489; }
  .c-purple text.ts { fill: #534AB7; }

  .c-teal  rect, .c-teal  circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal  text.th { fill: #085041; }
  .c-teal  text.ts { fill: #0F6E56; }

  .c-amber rect, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber text.th { fill: #633806; }
  .c-amber text.ts { fill: #854F0B; }

  text.th {
    font-family: sans-serif;
    font-size: 14px;
    font-weight: 500;
  }
  text.ts {
    font-family: sans-serif;
    font-size: 12px;
    font-weight: 400;
    fill: #444;
  }

  /* Standalone text (arrows, labels outside boxes) */
  text.ts-solo {
    font-family: sans-serif;
    font-size: 12px;
    font-weight: 400;
    fill: #555;
  }

  line, path {
    stroke: #555;
  }

  circle.junction {
    fill: #555;
  }

  @media print {
    body { padding: 8px; }
  }
</style>
</head>
<body>
<svg width="100%" viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>T.E.A.M. - Blaster Nano V1 Schaltübersicht</title>
  <desc>Blockschaltbild: Taster mit RC-Entprellung triggert NE555 monostabil und DFPlayer Pro. NE555 steuert LED-Blitz, DFPlayer den Lautsprecher.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="th" x="340" y="28" text-anchor="middle" dominant-baseline="central" fill="#1a1a1a">T.E.A.M. - Blaster Nano V1 — Schaltübersicht</text>

  <!-- Taster + RC -->
  <g class="c-blue">
    <rect x="20" y="100" width="150" height="130" rx="8" stroke-width="0.5"/>
    <text class="th" x="95" y="122" text-anchor="middle" dominant-baseline="central">Taster + RC</text>
    <text class="ts" x="95" y="152" text-anchor="middle" dominant-baseline="central">10kΩ Pullup → 5V</text>
    <text class="ts" x="95" y="177" text-anchor="middle" dominant-baseline="central">100nF → GND</text>
    <text class="ts" x="95" y="202" text-anchor="middle" dominant-baseline="central">andere Seite → GND</text>
  </g>

  <!-- NE555 -->
  <g class="c-purple">
    <rect x="255" y="80" width="170" height="200" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="98" text-anchor="middle" dominant-baseline="central">NE555</text>
    <text class="ts" x="340" y="122" text-anchor="middle" dominant-baseline="central">Monostabil — ~220ms</text>
    <text class="ts" x="340" y="149" text-anchor="middle" dominant-baseline="central">Pin 8 + 4 → 5V</text>
    <text class="ts" x="340" y="173" text-anchor="middle" dominant-baseline="central">Pin 2 ← Taster</text>
    <text class="ts" x="340" y="197" text-anchor="middle" dominant-baseline="central">Timing: 20kΩ / 10µF</text>
    <text class="ts" x="340" y="221" text-anchor="middle" dominant-baseline="central">Pin 3 → 100Ω → LED</text>
    <text class="ts" x="340" y="254" text-anchor="middle" dominant-baseline="central">Pin 1 → GND</text>
  </g>

  <!-- DFPlayer Pro -->
  <g class="c-teal">
    <rect x="470" y="80" width="170" height="150" rx="8" stroke-width="0.5"/>
    <text class="th" x="555" y="98" text-anchor="middle" dominant-baseline="central">DFPlayer Pro</text>
    <text class="ts" x="555" y="124" text-anchor="middle" dominant-baseline="central">VCC → 5V / GND</text>
    <text class="ts" x="555" y="150" text-anchor="middle" dominant-baseline="central">IO1 ← Taster</text>
    <text class="ts" x="555" y="176" text-anchor="middle" dominant-baseline="central">SPK+/- → Lautspr.</text>
    <text class="ts" x="555" y="202" text-anchor="middle" dominant-baseline="central">MicroSD: Soundfile</text>
  </g>

  <!-- LED + 100Ω -->
  <g class="c-amber">
    <rect x="255" y="315" width="170" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="337" text-anchor="middle" dominant-baseline="central">LED + 100Ω</text>
    <text class="ts" x="340" y="363" text-anchor="middle" dominant-baseline="central">andere Seite → GND</text>
  </g>

  <!-- Lautsprecher -->
  <g class="c-teal">
    <rect x="470" y="265" width="170" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="555" y="287" text-anchor="middle" dominant-baseline="central">Lautsprecher</text>
    <text class="ts" x="555" y="313" text-anchor="middle" dominant-baseline="central">8Ω / max. 2W</text>
  </g>

  <!-- Junction dot -->
  <circle class="junction" cx="170" cy="155" r="4.5"/>

  <!-- Arrow: Taster → NE555 TRIG -->
  <line x1="174" y1="155" x2="253" y2="155" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts-solo" x="213" y="144" text-anchor="middle" dominant-baseline="central">TRIG</text>

  <!-- Arrow: Taster → DFPlayer IO1 -->
  <path d="M170 151 L170 56 L555 56 L555 78" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts-solo" x="378" y="46" text-anchor="middle" dominant-baseline="central">IO1 (Soundtrigger)</text>

  <!-- Arrow: NE555 Pin3 → LED -->
  <line x1="340" y1="280" x2="340" y2="313" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts-solo" x="358" y="298" text-anchor="start" dominant-baseline="central">Pin 3</text>

  <!-- Arrow: DFPlayer → Lautsprecher -->
  <line x1="555" y1="230" x2="555" y2="263" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts-solo" x="573" y="249" text-anchor="start" dominant-baseline="central">SPK</text>
</svg>
</body>
</html>
